<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Forgotten Password</title>
	<link rel="icon" href="facebook.png">
	<style>
		body {
			background-color: #E9EBEE;
		}
		.main {
			width: 35%;
			margin: 12em auto;
			background-color: #fff;
			padding: 25px;
			box-shadow: 1px 1px 5px;
		}
		.main > input {
			display: block;
			margin: 1em 0em 1.5em 0em;
			padding: 1em;
			width: 100%;
			box-sizing: border-box;
			font-size: 1em; 
		}
		.right {
			text-align: right;
			margin-top: 1em;
		}
		.right input {
			padding: 0.75em 2em;
			border: none;
			border-radius: 3px;
			font-size: 1.01em;
		}
		input.cln {
			background-color: #1876F2;
			color: white;
		}
	</style>
</head>
<body>
	<form action="">
			<div class="main">
				<h2>Find Your Account</h2>
				<hr>
				<p>Please enter your email address or mobile number to search for your account.</p>
				<input type="text" placeholder="Mobile number">
				<hr>
			<div class="right">
				<input type="button" value="Cancel">
				<input type="button" value="Search" class="cln">
			</div>
		</div>
	</form>
</body>
</html>
