<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="https://developerimranhossen.github.io/test/facebook.png">
	<title>Sign Up</title>
	<style>
		body {
			background-color: #E9EBEE;
		}
		.main, .br-dt, .mid {
			width: 100%;
			margin: 0 auto;
			background-color: #fff;
			padding: 1em;
		}
		.ma {
			box-shadow: 1px 1px 5px;
			width: 35%;
			margin: 50px auto;
		}
		.main h1, p {
			margin: 0;
		}

		hr {
			margin: 0 auto;
			width: 35%;
			padding: 0 1em;
		}
		.mid input {
			padding: .6em;
			width: 100%;
			margin: .5em 0;
			background-color: #F5F6F7;
			font-size: 1.04rem;
			border-radius: 6px;
		}

		form {
			display: flex;
			flex-wrap: wrap;
			justify-content: space-between;
		}
		.mid input:nth-child(1), .mid input:nth-child(2) {
			width: 42%;
			
		}
		.mid input:last-child {
			margin-bottom: -1em; 
		}
		.br-dt span {
			background-color: gray;
			display: inline-block;
			width: 16px;
			height: 16px;
			border-radius: 50%;
			text-align: center;
			margin: .3em 0;
		}
		.cont {
			display: flex;
			justify-content: space-between;
		}
		.br-dt select {
			height: 2.9em;
			width: 30%;
			border-radius: 6px;
		}
		.gen {
			display: flex;
			justify-content: space-between;
		}
		.gn {
			border: 1px solid black;
			display: flex;
			justify-content: space-between;
			width: 25%;
			padding: .65em;
			border-radius: 6px;
		}
		
		.fin a {
			text-decoration: none;
		}
		.fin p {
			font-size: .8em;
			margin: 15px 0;
		}
		.fin input {
			display: block;
			margin: 0px auto;
			background-color: #00A400;
			height: 40px;
			width: 40%;
			font-size: 1.1rem;
			color: white;
			border-radius: 6px;
		}
		.fin input:hover {
			background-color: #66985A;
		}

	</style>
</head>
<body>
	<div class="ma">
	<div class="main">
		<h1>Sign Up</h1>
		<p>It's quick and easy.</p>
	</div>
	<hr>
	<div class="mid">
		<form action="">
			<input type="text" placeholder="First name">
			<input type="text" placeholder="Surname">
			<input type="text" placeholder="Mobile number or email address">
			<input type="text" placeholder="New password">
		</form>
	</div>
	<div class="br-dt">
		<p>Date of birth<span>?</span></p>
		<div class="cont">
		<select name="" id="">
			<option value="">1</option>
			<option value="">2</option>
			<option value="">3</option>
			<option value="">4</option>
			<option value="">5</option>
			<option value="">6</option>
			<option value="">7</option>
			<option value="">8</option>
			<option value="">9</option>
			<option value="">10</option>
			<option value="">11</option>
			<option value="">12</option>
			<option value="">13</option>
			<option value="">14</option>
			<option value="">15</option>
			<option value="">16</option>
			<option value="">17</option>
			<option value="">18</option>
			<option value="">19</option>
			<option value="">20</option>
			<option value="">21</option>
			<option value="">22</option>
			<option value="">23</option>
			<option value="">24</option>
			<option value="">25</option>
			<option value="">26</option>
			<option value="">27</option>
			<option value="">28</option>
			<option value="">29</option>
			<option value="">30</option>
			<option value="">31</option>
		</select>
		<select name="" id="">
			<option value="">Jan</option>
			<option value="">Feb</option>
			<option value="">Mar</option>
			<option value="">Apr</option>
			<option value="">May</option>
			<option value="">Jun</option>
			<option value="">Jul</option>
			<option value="">Aug</option>
			<option value="">Sep</option>
			<option value="">Oct</option>
			<option value="">Nov</option>
			<option value="">Dec</option>
		</select>
		<select name="" id="">
			<option value="">1999</option>
			<option value="">2000</option>
			<option value="">2001</option>
			<option value="">2002</option>
			<option value="">2003</option>
			<option value="">2004</option>
			<option value="">2005</option>
			<option value="">2006</option>
			<option value="">2007</option>
			<option value="">2008</option>
			<option value="">2009</option>
			<option value="">2011</option>
			<option value="">2012</option>
			<option value="">2013</option>
			<option value="">2014</option>
			<option value="">2015</option>
			<option value="">2016</option>
			<option value="">2017</option>
			<option value="">2018</option>
			<option value="">2019</option>
			<option value="">2020</option>
			<option value="">2021</option>
		</select>
		</div>
		<p>Gender<span>?</span></p>
			<div class="gen">
				
				<div class="gn"><label for="f">Female</label><input type="radio" id="f" name="gender"></div>
				<div class="gn"><label for="m">Male</label><input type="radio" id="m" name="gender"></div>
				<div class="gn"><label for="c">Custom</label><input type="radio" id="c" name="gender"></div>
			</div>
			<div class="fin">
				<p>By clicking Sign Up, you agree to our <a href="#">Terms,</a><a href="#">Data Policy</a>  and <a href="#">Cookie Policy.</a> You may receive SMS notifications from us and can opt out at any time.Sign Up</p>
				<input type="button" value="Sign Up">

			</div>
	</div>
	</div>
</body>
</html>
